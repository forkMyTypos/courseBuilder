<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Course Builder — inaflash.cards</title>
<meta name="description" content="Turn inaflash.cards decks into a deploy-ready static course website. Local-first, no server."/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://cdnjs.cloudflare.com https://unpkg.com https://api.github.com; frame-src blob:;">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="1.5" y="1.5" width="21" height="21" rx="5" fill="%2310131f" stroke="%233b82f6" stroke-width="1"/><polygon points="12.67 4.5 6 13.5 12 13.5 11.33 19.5 18 10.5 12 10.5 12.67 4.5" fill="%233b82f6"/></svg>'/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js" integrity="sha512-78KH17QLT5e55GJqP76vutp1D2iAoy06WcYBXB6iBCsmO6wWzx0Qdg8EDpm8mKXv68BcvHOyeeP4wxAL0twJGQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://unpkg.com/dexie@4.0.10/dist/dexie.js" integrity="sha384-AaFNSboo7n7wMSa+hMOGH20eywfFbLnHI3XKB5MLGUFBMaRAOCPDDkhGdm/Aar+p" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0d0d14;color:#e6e6f0;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
a{color:#7cb0ff}
#top{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #1c1c2a;background:#0a0a11}
.brand{font-size:16px;font-weight:800;color:#ece9f5}.brand b{color:#3b82f6}
.brand .bolt{color:#3b82f6}
#top .sp{flex:1}
.tbtn{height:34px;padding:0 14px;border-radius:8px;border:1px solid #2a2a3e;background:#16161f;color:#cfcfe4;font-size:13px;font-weight:600}
.tbtn:hover{border-color:#3a3a56}
.tbtn.primary{background:#16284a;border-color:#3b82f6;color:#bcd4ff}
.tbtn.primary:hover{background:#1d3460}
#wrap{flex:1;min-height:0;display:flex}
#left{width:340px;flex-shrink:0;border-right:1px solid #1c1c2a;display:flex;flex-direction:column;overflow:hidden;background:#0c0c13}
.sec{padding:14px 16px;border-bottom:1px solid #16161f}
.sec h2{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#6f6f90;margin-bottom:10px;display:flex;align-items:center}
.sec h2 .add{margin-left:auto;width:20px;height:20px;border-radius:6px;border:1px solid #2a2a3a;background:#16161f;color:#9090a8;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
.sec h2 .add:hover{color:#3b82f6;border-color:#3b82f6}
.fld{margin-bottom:9px}
.fld label{display:block;font-size:10.5px;color:#8a8aa8;margin-bottom:3px}
.fld input,.fld textarea{width:100%;background:#13131c;border:1px solid #26263a;border-radius:7px;color:#e6e6f0;font-size:12.5px;padding:7px 9px;outline:none;font-family:inherit}
.fld input:focus,.fld textarea:focus{border-color:#3b82f6}
.fld textarea{resize:vertical;min-height:42px}
#lessons{flex:1;min-height:0;overflow-y:auto;padding:8px 10px}
.lrow{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:#13131c;border:1px solid #20202e;margin-bottom:7px;cursor:pointer}
.lrow:hover{border-color:#34344e}
.lrow.active{border-color:#3b82f6;background:#13203a}
.lrow .num{font-family:monospace;font-size:13px;color:#3b82f6;font-weight:700}
.lrow .li{flex:1;min-width:0}
.lrow .lt{font-size:13px;font-weight:600;color:#ece9f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .lc{font-size:10.5px;color:#7a7a98}
.lrow .ord{display:flex;flex-direction:column;gap:1px}
.lrow .ord button{width:18px;height:13px;border:none;background:transparent;color:#62627e;font-size:9px;line-height:1;padding:0}
.lrow .ord button:hover{color:#cfcfe4}
.lrow .del{width:20px;height:20px;border:none;background:transparent;color:#62627e;font-size:13px;border-radius:5px}
.lrow .del:hover{color:#f87171;background:#2a1414}
.empty{color:#56566e;font-size:12px;text-align:center;padding:30px 14px;line-height:1.7}
#right{flex:1;min-width:0;display:flex;flex-direction:column}
#pvbar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #1c1c2a;background:#0a0a11}
#pvbar select{height:30px;background:#13131c;border:1px solid #26263a;border-radius:7px;color:#cfcfe4;font-size:12px;padding:0 8px}
#pvbar .lbl{font-size:11px;color:#7a7a98}
#preview{flex:1;min-height:0;border:none;background:#fff;width:100%}
#preview-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#56566e;font-size:13px;text-align:center;padding:20px;line-height:1.8}
/* modal */
#modal{position:fixed;inset:0;background:rgba(5,5,10,.72);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
#modal.show{display:flex}
.mbox{width:min(560px,96vw);max-height:90vh;overflow-y:auto;background:#101019;border:1px solid #2c2c44;border-radius:13px;padding:18px}
.mbox h3{font-size:16px;color:#fff;margin-bottom:4px}
.mbox .sub{font-size:12px;color:#8a8aa8;margin-bottom:14px;line-height:1.5}
.mbox .row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16161f;border:1px solid #2c2c44;color:#e6e6f0;padding:10px 18px;border-radius:9px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw}
#toast.show{opacity:1}
#toast.ok{border-color:#2a5a3a}#toast.err{border-color:#5a2b2b}#toast.info{border-color:#2a3a5a}
.hint{font-size:11px;color:#6a6a86;line-height:1.5;margin-top:6px}
.file-drop{border:1.5px dashed #2e2e4a;border-radius:9px;padding:14px;text-align:center;color:#8a8aa8;font-size:12px;cursor:pointer}
.file-drop:hover{border-color:#3b82f6;color:#bcd4ff}
@media(max-width:780px){#left{width:100%;position:absolute;inset:0;z-index:50}#left.hide{display:none}#right{width:100%}}
</style>
</head>
<body>
<div id="top">
  <span class="brand"><span class="bolt">⚡</span> Course <b>Builder</b></span>
  <span class="sp"></span>
  <button class="tbtn" id="btn-settings">Course settings</button>
  <button class="tbtn" id="btn-github">Publish to GitHub</button>
  <button class="tbtn primary" id="btn-export">Download site (.zip)</button>
</div>
<div id="wrap">
  <aside id="left">
    <div class="sec">
      <h2>Sites <button class="add" id="btn-add-site" title="Add a publish target">+</button></h2>
      <div id="sites-host"></div>
    </div>
    <div class="sec">
      <h2>Lessons <button class="add" id="btn-add" title="Add a lesson">+</button></h2>
      <div id="lessons-host"><div id="lessons"></div></div>
    </div>
  </aside>
  <main id="right">
    <div id="pvbar">
      <span class="lbl">Preview:</span>
      <select id="pv-pick"></select>
      <span class="sp" style="flex:1"></span>
      <span class="lbl" id="pv-count"></span>
    </div>
    <iframe id="preview" sandbox="allow-same-origin"></iframe>
    <div id="preview-empty">Add a lesson to see a live preview.<br>Build a deck in inaflash.cards, export it, then import it here.</div>
  </main>
</div>

<div id="modal"><div class="mbox" id="mbox"></div></div>
<div id="toast"></div>

<script>
/* ===== Course Builder: browser-only static course-site generator =====
   Turns inaflash.cards decks into a deploy-ready site (landing + per-lesson SEO
   pages + importable deck JSON + sitemap/robots/CNAME). Mirrors the Node build.js
   but runs entirely in the browser. Course state persists in IndexedDB. */
const db=new Dexie('course-builder');
db.version(1).stores({course:'id',lessons:'++id,order'});
db.version(2).stores({course:'id',lessons:'++id,order',gh:'id',targets:'++id'});
let cfg={id:'cfg',courseTitle:'My Flashcard Course',courseTagline:'A free course. Read each lesson, then study it as flashcards.',siteUrl:'https://thai.inaflash.cards',appUrl:'https://inaflash.cards',author:'inaflash.cards'};
let lessons=[],activeLesson=null;

const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;};
const attr=s=>esc(s).replace(/'/g,'&#39;');
const slugify=s=>String(s||'').toLowerCase().replace(/\([^)]*\)/g,' ').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
function toast(msg,kind){const t=$('toast');t.textContent=msg;t.className='show '+(kind||'');clearTimeout(t._t);t._t=setTimeout(()=>t.className=t.className.replace('show','').trim(),2600);}

/* ---- forgiving deck parse (mirror of app's normalizeImport) ---- */
function plainText(html){const d=document.createElement('div');d.innerHTML=DOMPurify.sanitize(html||'');
  // put a space between block elements so stacked lines don't run together
  d.querySelectorAll('div,p,br,li').forEach(el=>el.append(' '));
  d.querySelectorAll('[data-img-run],img').forEach(el=>el.remove());
  return (d.textContent||'').replace(/\u200B/g,' ').replace(/\s+/g,' ').trim();}
/* Pull the first image (+ its captured attribution) out of a card side. */
function firstImage(html){
  const d=document.createElement('div');d.innerHTML=DOMPurify.sanitize(html||'',{ADD_ATTR:['data-img-meta','data-img-run']});
  const img=d.querySelector('img');if(!img)return null;
  const span=d.querySelector('[data-img-meta]');let meta=null;
  if(span&&span.getAttribute('data-img-meta')){try{meta=JSON.parse(decodeURIComponent(span.getAttribute('data-img-meta')));}catch(_){}}
  return {src:img.getAttribute('src')||'',meta};
}
function creditLine(meta){
  if(!meta)return '';
  const by=meta.by||'',src=meta.src||'',link=meta.link||meta.srcLink||'';
  const byLink=link?`<a href="${esc(link)}" target="_blank" rel="noopener nofollow">${esc(by)}</a>`:esc(by);
  if(by&&src)return `Photo by ${byLink} on ${esc(src)}`;
  if(by||src){const who=link?`<a href="${esc(link)}" target="_blank" rel="noopener nofollow">${esc(by||src)}</a>`:esc(by||src);return (by?'Photo: ':'Source: ')+who;}
  return '';
}
function normalizeDeck(data){
  let name=null,arr=null;
  if(Array.isArray(data))arr=data;
  else if(data&&typeof data==='object'){name=data.name||data.title||data.deckName||null;arr=data.cards||data.flashcards||data.deck||data.items||data.entries||(Array.isArray(data.data)?data.data:null);}
  if(!Array.isArray(arr))return{name,cards:[]};
  const pick=(o,keys)=>{for(const k of keys){if(o[k]!=null&&o[k]!=='')return o[k];}return'';};
  const wrap=v=>{const s=String(v==null?'':v);return /<[a-z][\s\S]*>/i.test(s)?s:'<div class="line" style="text-align:center">'+esc(s)+'</div>';};
  const cards=[];
  for(const raw of arr){
    let a='',b='';
    if(Array.isArray(raw)){a=raw[0];b=raw[1];}
    else if(raw&&typeof raw==='object'){a=pick(raw,['sideA','front','question','q','term','prompt','word','en','text']);b=pick(raw,['sideB','back','answer','a','definition','meaning','translation','def']);}
    else if(typeof raw==='string'){a=raw;}
    if(a===''&&b==='')continue;
    cards.push({sideA:DOMPurify.sanitize(wrap(a)),sideB:DOMPurify.sanitize(wrap(b))});
  }
  return{name,cards};
}

/* ===== persistence ===== */
async function load(){
  await db.open();
  const c=await db.course.get('cfg');if(c)cfg=c;else await db.course.put(cfg);
  lessons=(await db.lessons.toArray()).sort((a,b)=>(a.order||0)-(b.order||0));
  if(lessons.length)activeLesson=lessons[0].id;
}
async function saveCfg(){await db.course.put(cfg);}
async function saveLesson(l){await db.lessons.put(l);}
async function reorder(){for(let i=0;i<lessons.length;i++){lessons[i].order=i;await db.lessons.update(lessons[i].id,{order:i});}}

/* ===== HTML generation (mirror of build.js) ===== */
function relPath(url){const p=url.replace(cfg.siteUrl,'').replace(/^\//,'');const depth=p.split('/').filter(Boolean).length-(p.endsWith('/')?0:1);return depth>0?'../'.repeat(depth):'';}
function pageHead(o){const SITE=cfg.siteUrl.replace(/\/$/,'');return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${esc(o.title)}</title>
<meta name="description" content="${attr(o.desc)}"/>
<link rel="canonical" href="${esc(o.url)}"/>
<meta property="og:type" content="${o.type||'website'}"/>
<meta property="og:title" content="${attr(o.title)}"/>
<meta property="og:description" content="${attr(o.desc)}"/>
<meta property="og:url" content="${esc(o.url)}"/>
<meta property="og:site_name" content="${attr(cfg.courseTitle)}"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="${attr(o.title)}"/>
<meta name="twitter:description" content="${attr(o.desc)}"/>
<meta name="theme-color" content="#0d0d14"/>
<link rel="stylesheet" href="${relPath(o.url)}style.css"/>
</head>
<body>
<header class="site-head">
  <a class="brand" href="${SITE}/"><span class="bolt">⚡</span> ${esc(cfg.courseTitle)}</a>
  <a class="app-link" href="${cfg.appUrl}" target="_blank" rel="noopener">Built with inaflash.cards ↗</a>
</header>`;}
function pageFoot(){return `<footer class="site-foot"><p>Studied with <a href="${cfg.appUrl}" target="_blank" rel="noopener">inaflash.cards</a>, a local-first flashcard app.</p></footer>
</body></html>`;}
function deckJSON(l){return JSON.stringify({name:l.title||'Lesson',version:2,cards:l.cards.map(c=>({sideA:c.sideA,sideB:c.sideB,sr:null,bg:null}))});}
function importHref(l){const SITE=cfg.siteUrl.replace(/\/$/,'');return `${cfg.appUrl}/#import=${encodeURIComponent(SITE+'/decks/'+l.slug+'.json')}`;}

function landingHTML(){
  const SITE=cfg.siteUrl.replace(/\/$/,'');const url=SITE+'/';
  const items=lessons.map((l,i)=>`
    <li><a class="lesson-link" href="${SITE}/${esc(l.slug)}/">
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="meta"><span class="lt">${esc(l.title)}</span><span class="ld">${l.cards.length} cards${l.level?' · '+esc(l.level):''}</span></span>
      <span class="go">→</span></a></li>`).join('');
  const courseLd={"@context":"https://schema.org","@type":"Course","name":cfg.courseTitle,"description":cfg.courseTagline,"url":url,"provider":{"@type":"Organization","name":cfg.author,"url":cfg.appUrl}};
  const itemList={"@context":"https://schema.org","@type":"ItemList","name":cfg.courseTitle,"itemListElement":lessons.map((l,i)=>({"@type":"ListItem","position":i+1,"name":l.title,"url":`${SITE}/${l.slug}/`}))};
  return pageHead({title:cfg.courseTitle,desc:cfg.courseTagline,url})
    +`<main class="wrap"><section class="hero"><h1>${esc(cfg.courseTitle)}</h1><p class="tagline">${esc(cfg.courseTagline)}</p>
    <p class="how">Each lesson is a readable list you can also study as interactive flashcards — free, no signup.</p></section>
    <section><h2 class="sec-h">Lessons</h2><ol class="lesson-list">${items||'<li class="empty-li">No lessons yet.</li>'}</ol></section></main>
    <script type="application/ld+json">${JSON.stringify(courseLd)}<\/script>
    <script type="application/ld+json">${JSON.stringify(itemList)}<\/script>`+pageFoot();
}
function lessonHTML(l,i){
  const SITE=cfg.siteUrl.replace(/\/$/,'');const url=`${SITE}/${l.slug}/`;
  const title=`${l.title} — ${cfg.courseTitle}`;
  const desc=l.description||(`${l.title}: `+l.cards.slice(0,6).map(c=>plainText(c.sideB)||plainText(c.sideA)).filter(Boolean).join(', '));
  const rows=l.cards.map(c=>{const front=plainText(c.sideA),back=plainText(c.sideB);
    const im=firstImage(c.sideB)||firstImage(c.sideA);
    const cred=im&&im.meta?creditLine(im.meta):'';
    const pic=im?`<div class="vocab-pic"><img src="${esc(im.src)}" alt="${attr(front||back)}" loading="lazy"/>${cred?`<span class="cred">${cred}</span>`:''}</div>`:'';
    return `<div class="vocab-row${im?' has-pic':''}">${pic}<dt>${esc(front)}</dt><dd>${esc(back)}</dd></div>`;}).join('');
  const prev=i>0?lessons[i-1]:null,next=i<lessons.length-1?lessons[i+1]:null;
  const nav=`<nav class="lesson-nav">${prev?`<a href="${SITE}/${esc(prev.slug)}/">← ${esc(prev.title)}</a>`:'<span></span>'}${next?`<a href="${SITE}/${esc(next.slug)}/">${esc(next.title)} →</a>`:'<span></span>'}</nav>`;
  const ld={"@context":"https://schema.org","@type":"LearningResource","name":l.title,"description":desc,"url":url,"educationalLevel":l.level||"Beginner","teaches":l.cards.map(c=>plainText(c.sideB)).filter(Boolean),"isPartOf":{"@type":"Course","name":cfg.courseTitle,"url":SITE+'/'},"provider":{"@type":"Organization","name":cfg.author,"url":cfg.appUrl}};
  const crumbs={"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":cfg.courseTitle,"item":SITE+'/'},{"@type":"ListItem","position":2,"name":l.title,"item":url}]};
  return pageHead({title,desc,url,type:'article'})
    +`<main class="wrap"><nav class="crumbs"><a href="${SITE}/">${esc(cfg.courseTitle)}</a> <span>/</span> ${esc(l.title)}</nav>
    <article><h1>${esc(l.title)}</h1><p class="lead">${esc(desc)}</p>
    <div class="study-cta"><a class="btn primary" href="${importHref(l)}">★ Study these as flashcards</a>
      <a class="btn" href="${relPath(url)}decks/${esc(l.slug)}.json" download>Download deck (.json)</a></div>
    <p class="cta-note">"Study" loads this set into <a href="${cfg.appUrl}" target="_blank" rel="noopener">inaflash.cards</a> — free flip cards, quizzes & spaced repetition.</p>
    <h2 class="sec-h">Contents (${l.cards.length} cards)</h2><dl class="vocab">${rows}</dl></article>${nav}</main>
    <script type="application/ld+json">${JSON.stringify(ld)}<\/script>
    <script type="application/ld+json">${JSON.stringify(crumbs)}<\/script>`+pageFoot();
}
const SITE_CSS=`*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0d0d14;color:#e6e6f0;line-height:1.6}a{color:#7cb0ff}
.site-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;border-bottom:1px solid #1c1c2a;background:#0a0a11;position:sticky;top:0;z-index:5}
.brand{font-size:18px;font-weight:800;color:#ece9f5;text-decoration:none}.brand .bolt{color:#3b82f6}
.app-link{font-size:12px;color:#8a8aa8;text-decoration:none}.app-link:hover{color:#7cb0ff}
.wrap{max-width:760px;margin:0 auto;padding:30px 20px 50px}
.hero h1{font-size:34px;line-height:1.2;color:#fff;margin-bottom:10px}.hero .tagline{font-size:17px;color:#c4c4da;margin-bottom:10px}.hero .how{font-size:14px;color:#8e8eaa}
.sec-h{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:#6f6f90;margin:34px 0 14px;font-weight:700}
.lesson-list{list-style:none;display:flex;flex-direction:column;gap:10px}.empty-li{color:#56566e;font-size:14px}
.lesson-link{display:flex;align-items:center;gap:14px;padding:15px 16px;background:#15151f;border:1px solid #24243a;border-radius:11px;text-decoration:none;color:inherit}
.lesson-link:hover{border-color:#3b82f6}
.lesson-link .num{font-family:monospace;font-size:18px;color:#3b82f6;font-weight:700}.lesson-link .meta{flex:1;display:flex;flex-direction:column}
.lesson-link .lt{font-size:16px;font-weight:700;color:#ece9f5}.lesson-link .ld{font-size:12px;color:#7a7a98}.lesson-link .go{font-size:20px;color:#56566e}
.crumbs{font-size:12.5px;color:#7a7a98;margin-bottom:18px}.crumbs a{color:#8a8aa8;text-decoration:none}.crumbs span{margin:0 6px;color:#44445c}
article h1{font-size:28px;color:#fff;line-height:1.25;margin-bottom:10px}.lead{font-size:15.5px;color:#b6b6cf;margin-bottom:20px}
.study-cta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.btn{display:inline-block;padding:11px 18px;border-radius:9px;text-decoration:none;font-size:14px;font-weight:700;border:1px solid #2a2a3e;background:#16161f;color:#cfcfe4}
.btn.primary{background:#16284a;border-color:#3b82f6;color:#bcd4ff}
.cta-note{font-size:12px;color:#7a7a98;margin-bottom:24px}

/* ===== rendering the left panel + preview ===== */
function fmtAgo(ts){if(!ts)return 'never published';const s=(Date.now()-ts)/1000;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function renderSites(){
  const host=$('sites-host');if(!host)return;host.innerHTML='';
  if(!ghTargets.length){host.innerHTML='<div class="empty" style="padding:14px 8px">No sites yet.<br>Click <b>+</b> to add a GitHub repo to publish to.</div>';return;}
  ghTargets.forEach(t=>{
    const row=document.createElement('div');row.className='lrow';row.style.cursor='default';
    row.innerHTML=`<span class="li"><span class="lt">${esc(t.owner)}/${esc(t.repo)}</span>
      <span class="lc">${fmtAgo(t.lastAt)}${t.lastAt?' · '+(t.lastLessons||0)+' lessons':''}</span></span>
      <button class="tbtn primary" data-pubnow="${t.id}" style="height:26px;padding:0 10px;font-size:11px">Publish</button>`;
    row.querySelector('[data-pubnow]').addEventListener('click',()=>githubModal());
    host.appendChild(row);
  });
}
function renderLessons(){
  const host=$('lessons');host.innerHTML='';
  if(!lessons.length){host.innerHTML='<div class="empty">No lessons yet.<br>Click <b>+</b> to import your first deck from inaflash.cards.</div>';}
  lessons.forEach((l,i)=>{
    const row=document.createElement('div');row.className='lrow'+(l.id===activeLesson?' active':'');
    row.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="li"><span class="lt">${esc(l.title)}</span><span class="lc">${l.cards.length} cards</span></span>
      <span class="ord"><button data-up title="Move up">▲</button><button data-down title="Move down">▼</button></span>
      <button class="del" title="Delete lesson">×</button>`;
    row.addEventListener('click',e=>{if(e.target.closest('button'))return;activeLesson=l.id;renderLessons();renderPreview();});
    row.querySelector('[data-up]').addEventListener('click',async e=>{e.stopPropagation();if(i>0){lessons.splice(i-1,0,lessons.splice(i,1)[0]);await reorder();renderLessons();renderPreview();}});
    row.querySelector('[data-down]').addEventListener('click',async e=>{e.stopPropagation();if(i<lessons.length-1){lessons.splice(i+1,0,lessons.splice(i,1)[0]);await reorder();renderLessons();renderPreview();}});
    row.querySelector('.del').addEventListener('click',async e=>{e.stopPropagation();if(!confirm('Delete "'+l.title+'"?'))return;await db.lessons.delete(l.id);lessons=lessons.filter(x=>x.id!==l.id);if(activeLesson===l.id)activeLesson=lessons[0]?lessons[0].id:null;await reorder();renderLessons();renderPreview();});
    host.appendChild(row);
  });
  // preview picker
  const pick=$('pv-pick');pick.innerHTML='<option value="__home">🏠 Landing page</option>'+lessons.map(l=>`<option value="${l.id}">${esc(l.title)}</option>`).join('');
  pick.value=activeLesson||'__home';
}
function renderPreview(){
  const fr=$('preview'),emp=$('preview-empty');
  if(!lessons.length){fr.style.display='none';emp.style.display='flex';$('pv-count').textContent='';return;}
  fr.style.display='block';emp.style.display='none';
  const pickVal=$('pv-pick').value;
  let html;
  if(pickVal==='__home'){html=landingHTML();$('pv-count').textContent=lessons.length+' lessons';}
  else{const i=lessons.findIndex(l=>l.id==pickVal);const l=lessons[i];if(!l){html=landingHTML();}else{html=lessonHTML(l,i);$('pv-count').textContent=l.cards.length+' cards';}}
  fr.srcdoc=html.replace('</head>',`<style>${SITE_CSS}</style></head>`);
}

/* ===== modals ===== */
function closeModal(){$('modal').classList.remove('show');}
function addLessonModal(){
  $('mbox').innerHTML=`<h3>Add a lesson</h3><div class="sub">Paste the JSON you exported from inaflash.cards, or choose the file. The deck's cards become this lesson.</div>
    <div class="fld"><label>Lesson title</label><input id="m-title" placeholder="e.g. Countries"/></div>
    <div class="fld"><label>Short description (optional, good for SEO)</label><textarea id="m-desc" placeholder="What this lesson covers…"></textarea></div>
    <div class="fld"><label>Level (optional)</label><input id="m-level" placeholder="Beginner"/></div>
    <div class="fld"><label>Deck JSON</label><textarea id="m-json" placeholder='{"name":"…","cards":[…]}' style="min-height:120px;font-family:monospace;font-size:11px"></textarea></div>
    <div class="file-drop" id="m-drop">📂 …or click to choose an exported .json file</div>
    <input type="file" id="m-file" accept=".json,application/json" style="display:none"/>
    <div class="hint">Tip: in inaflash.cards, Export → "This set" gives you the JSON for one deck.</div>
    <div class="row"><button class="tbtn" id="m-cancel">Cancel</button><button class="tbtn primary" id="m-ok">Add lesson</button></div>`;
  $('modal').classList.add('show');
  $('m-cancel').addEventListener('click',closeModal);
  $('m-drop').addEventListener('click',()=>$('m-file').click());
  $('m-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;f.text().then(t=>{$('m-json').value=t;if(!$('m-title').value){try{const d=JSON.parse(t);if(d.name)$('m-title').value=d.name;}catch(_){}}});});
  $('m-json').addEventListener('blur',()=>{if(!$('m-title').value){try{const d=JSON.parse($('m-json').value);if(d&&d.name)$('m-title').value=d.name;}catch(_){}}});
  $('m-ok').addEventListener('click',addLessonCommit);
}
async function addLessonCommit(){
  const title=$('m-title').value.trim();const raw=$('m-json').value.trim();
  if(!raw){toast('Paste a deck JSON first','err');return;}
  let data;try{data=JSON.parse(raw);}catch(_){toast('That JSON didn\\u2019t parse','err');return;}
  const norm=normalizeDeck(data);
  if(!norm.cards.length){toast('No cards found in that JSON','err');return;}
  const t=title||norm.name||('Lesson '+(lessons.length+1));
  let slug=slugify(t)||('lesson-'+(lessons.length+1));
  // ensure unique slug
  const used=new Set(lessons.map(l=>l.slug));let s=slug,n=2;while(used.has(s)){s=slug+'-'+n++;}slug=s;
  const lesson={title:t,slug,description:$('m-desc').value.trim(),level:$('m-level').value.trim(),cards:norm.cards,order:lessons.length};
  const id=await db.lessons.add(lesson);lesson.id=id;lessons.push(lesson);activeLesson=id;
  closeModal();renderLessons();renderPreview();toast('Added "'+t+'" ('+norm.cards.length+' cards)','ok');
}
function settingsModal(){
  $('mbox').innerHTML=`<h3>Course settings</h3><div class="sub">These fill the landing page, meta tags, and the import links. The site URL must match where you'll host it.</div>
    <div class="fld"><label>Course title</label><input id="s-title" value="${attr(cfg.courseTitle)}"/></div>
    <div class="fld"><label>Tagline</label><textarea id="s-tag">${esc(cfg.courseTagline)}</textarea></div>
    <div class="fld"><label>Site URL (where this course is hosted)</label><input id="s-site" value="${attr(cfg.siteUrl)}" placeholder="https://thai.inaflash.cards"/></div>
    <div class="fld"><label>App URL (your inaflash.cards)</label><input id="s-app" value="${attr(cfg.appUrl)}" placeholder="https://inaflash.cards"/></div>
    <div class="fld"><label>Author / organization</label><input id="s-author" value="${attr(cfg.author)}"/></div>
    <div class="row"><button class="tbtn" id="s-cancel">Cancel</button><button class="tbtn primary" id="s-ok">Save</button></div>`;
  $('modal').classList.add('show');
  $('s-cancel').addEventListener('click',closeModal);
  $('s-ok').addEventListener('click',async()=>{
    cfg.courseTitle=$('s-title').value.trim()||'My Course';
    cfg.courseTagline=$('s-tag').value.trim();
    cfg.siteUrl=($('s-site').value.trim()||'https://example.com').replace(/\/$/,'');
    cfg.appUrl=($('s-app').value.trim()||'https://inaflash.cards').replace(/\/$/,'');
    cfg.author=$('s-author').value.trim()||'inaflash.cards';
    await saveCfg();closeModal();renderLessons();renderPreview();toast('Settings saved','ok');
  });
}

/* ===== export ZIP ===== */
async function exportZip(){
  if(!lessons.length){toast('Add at least one lesson first','err');return;}
  if(typeof JSZip==='undefined'){toast('ZIP library still loading — try again in a sec','err');return;}
  const SITE=cfg.siteUrl.replace(/\/$/,'');
  const zip=new JSZip();
  zip.file('style.css',SITE_CSS);
  zip.file('index.html',landingHTML().replace('</head>',`</head>`));
  zip.file('.nojekyll','');
  // CNAME from the site URL host
  try{const host=new URL(SITE).host;zip.file('CNAME',host+'\n');}catch(_){}
  lessons.forEach((l,i)=>{
    zip.folder(l.slug).file('index.html',lessonHTML(l,i));
    zip.folder('decks').file(l.slug+'.json',deckJSON(l));
  });
  const urls=[SITE+'/',...lessons.map(l=>`${SITE}/${l.slug}/`)];
  zip.file('sitemap.xml',`<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${urls.map(u=>`  <url><loc>${u}</loc></url>`).join('\n')}\n</urlset>\n`);
  zip.file('robots.txt',`User-agent: *\nAllow: /\nSitemap: ${SITE}/sitemap.xml\n`);
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='course-site.zip';a.click();URL.revokeObjectURL(a.href);
  toast('Site downloaded — upload its contents to your repo','ok');
}

/* ===== GitHub publishing =====
   Pushes the generated site straight into a repo via the GitHub Git Data API
   (one atomic commit). Auth is a fine-grained Personal Access Token the user
   pastes once; it lives only in this browser's IndexedDB and is sent only to
   api.github.com. This is intended as a PRIVATE tool — never promote a build
   that stores a token client-side. */
let ghToken=null,ghTargets=[];
async function ghLoad(){const t=await db.gh.get('token');ghToken=t?t.value:null;ghTargets=await db.targets.toArray();}
async function ghSaveToken(v){ghToken=v||null;if(v)await db.gh.put({id:'token',value:v});else await db.gh.delete('token');}

// Build the same file set the ZIP export produces, as {path -> {content}}.
function collectSiteFiles(){
  const SITE=cfg.siteUrl.replace(/\/$/,'');
  const files={};
  files['index.html']={content:landingHTML()};
  files['style.css']={content:SITE_CSS};
  files['.nojekyll']={content:''};
  try{files['CNAME']={content:new URL(SITE).host+'\n'};}catch(_){}
  lessons.forEach((l,i)=>{
    files[l.slug+'/index.html']={content:lessonHTML(l,i)};
    files['decks/'+l.slug+'.json']={content:deckJSON(l)};
  });
  const urls=[SITE+'/',...lessons.map(l=>`${SITE}/${l.slug}/`)];
  files['sitemap.xml']={content:`<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${urls.map(u=>`  <url><loc>${u}</loc></url>`).join('\n')}\n</urlset>\n`};
  files['robots.txt']={content:`User-agent: *\nAllow: /\nSitemap: ${SITE}/sitemap.xml\n`};
  return files;
}
async function gh(path,opts){
  const r=await fetch('https://api.github.com'+path,Object.assign({headers:{'Authorization':'Bearer '+ghToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}},opts||{}));
  if(!r.ok){let m='';try{m=(await r.json()).message;}catch(_){}throw new Error('GitHub '+r.status+(m?': '+m:''));}
  return r.status===204?null:r.json();
}
async function publishToGitHub(target,statusCb){
  const{owner,repo,branch}=target;const b=branch||'main';
  const log=m=>{if(statusCb)statusCb(m);};
  log('Reading branch \u2026');
  let baseSha,baseTree;
  try{const ref=await gh(`/repos/${owner}/${repo}/git/ref/heads/${b}`);baseSha=ref.object.sha;
      const c=await gh(`/repos/${owner}/${repo}/git/commits/${baseSha}`);baseTree=c.tree.sha;}
  catch(e){throw new Error('Could not read branch "'+b+'" \u2014 check repo, branch, and token access. ('+e.message+')');}
  const files=collectSiteFiles();const names=Object.keys(files);
  log('Uploading '+names.length+' files \u2026');
  const tree=[];
  for(const path of names){
    const blob=await gh(`/repos/${owner}/${repo}/git/blobs`,{method:'POST',body:JSON.stringify({content:files[path].content,encoding:'utf-8'})});
    tree.push({path,mode:'100644',type:'blob',sha:blob.sha});
  }
  log('Creating commit \u2026');
  const newTree=await gh(`/repos/${owner}/${repo}/git/trees`,{method:'POST',body:JSON.stringify({base_tree:baseTree,tree})});
  const commit=await gh(`/repos/${owner}/${repo}/git/commits`,{method:'POST',body:JSON.stringify({message:'Update course site via Course Builder',tree:newTree.sha,parents:[baseSha]})});
  await gh(`/repos/${owner}/${repo}/git/refs/heads/${b}`,{method:'PATCH',body:JSON.stringify({sha:commit.sha})});
  log('Done.');
  // record what/when we published on the target
  try{await db.targets.update(target.id,{lastSha:commit.sha,lastAt:Date.now(),lastLessons:lessons.length});const t=ghTargets.find(x=>x.id===target.id);if(t){t.lastSha=commit.sha;t.lastAt=Date.now();t.lastLessons=lessons.length;}renderSites();}catch(_){}
  return commit.sha;
}

function githubModal(){
  const hasTok=!!ghToken;
  const targetRows=ghTargets.map(t=>`<div class="lrow" data-tid="${t.id}" style="cursor:default">
      <span class="li"><span class="lt">${esc(t.owner)}/${esc(t.repo)}</span><span class="lc">branch: ${esc(t.branch||'main')}</span></span>
      <button class="tbtn primary" data-pub="${t.id}" style="height:28px;padding:0 11px;font-size:11px">Publish</button>
      <button class="del" data-del="${t.id}" title="Remove">\u00d7</button></div>`).join('');
  $('mbox').innerHTML=`<h3>Publish to GitHub</h3>
    <div class="sub">Pushes the generated site straight into a repo as one commit. Your token stays in this browser and is sent only to GitHub. Use a <b>fine-grained</b> token scoped to just these repos, with <b>Contents: Read and write</b>.</div>
    <div class="fld"><label>GitHub token (fine-grained PAT)</label><input id="g-token" type="password" placeholder="${hasTok?'saved \u2014 paste to replace':'github_pat_\u2026'}"/>
      <div class="hint">Make one at github.com \u2192 Settings \u2192 Developer settings \u2192 Fine-grained tokens. ${hasTok?'<a href="#" id="g-forget">Forget saved token</a>':''}</div></div>
    <h2 style="font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#6f6f90;margin:14px 0 8px">Your repos</h2>
    <div id="g-targets">${targetRows||'<div class="empty" style="padding:14px">No repos saved yet.</div>'}</div>
    <div class="fld" style="margin-top:10px"><label>Add a repo (owner / repo / branch)</label>
      <div style="display:flex;gap:6px"><input id="g-owner" placeholder="forkMyTypos" style="flex:1"/><input id="g-repo" placeholder="thaiFlashcards" style="flex:1"/><input id="g-branch" placeholder="main" style="width:80px"/></div></div>
    <div id="g-status" class="hint" style="min-height:16px;color:#7ec4b8"></div>
    <div class="row"><button class="tbtn" id="g-cancel">Close</button><button class="tbtn" id="g-add">Add repo</button></div>`;
  $('modal').classList.add('show');
  $('g-cancel').addEventListener('click',closeModal);
  const forget=$('g-forget');if(forget)forget.addEventListener('click',async e=>{e.preventDefault();await ghSaveToken(null);toast('Token forgotten','info');githubModal();});
  $('g-add').addEventListener('click',async()=>{
    const tokInput=$('g-token').value.trim();if(tokInput)await ghSaveToken(tokInput);
    const owner=$('g-owner').value.trim(),repo=$('g-repo').value.trim(),branch=$('g-branch').value.trim()||'main';
    if(!owner||!repo){toast('Need owner and repo','err');return;}
    await db.targets.add({owner,repo,branch});ghTargets=await db.targets.toArray();renderSites();githubModal();
  });
  $('mbox').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{await db.targets.delete(Number(b.dataset.del));ghTargets=await db.targets.toArray();renderSites();githubModal();}));
  $('mbox').querySelectorAll('[data-pub]').forEach(b=>b.addEventListener('click',async()=>{
    const tokInput=$('g-token').value.trim();if(tokInput)await ghSaveToken(tokInput);
    if(!ghToken){toast('Paste your token first','err');return;}
    if(!lessons.length){toast('Add at least one lesson','err');return;}
    const t=ghTargets.find(x=>x.id===Number(b.dataset.pub));
    const st=$('g-status');b.disabled=true;
    try{const sha=await publishToGitHub(t,m=>st.textContent=m);
      st.innerHTML='\u2705 Published to '+esc(t.owner)+'/'+esc(t.repo)+' \u00b7 commit '+sha.slice(0,7)+'. Pages will redeploy shortly.';
      toast('Published to GitHub','ok');}
    catch(e){st.innerHTML='\u274c '+esc(e.message);toast('Publish failed','err');}
    finally{b.disabled=false;}
  }));
}

/* ===== boot ===== */
$('btn-add').addEventListener('click',addLessonModal);
$('btn-settings').addEventListener('click',settingsModal);
$('btn-github').addEventListener('click',githubModal);
$('btn-add-site').addEventListener('click',githubModal);
$('btn-export').addEventListener('click',exportZip);
$('pv-pick').addEventListener('change',()=>{const v=$('pv-pick').value;if(v!=='__home'){activeLesson=Number(v);renderLessons();}renderPreview();});
$('modal').addEventListener('mousedown',e=>{if(e.target.id==='modal')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
(async()=>{try{await load();await ghLoad();}catch(e){console.error(e);toast('Storage failed to open','err');}renderLessons();renderSites();renderPreview();})();
</script>
